<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Bus Tracker</title>
    <style>
        :root {
            --primary-color: #0071e3;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --success-color: #34c759;
            --border-color: #d2d2d7;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 24px;
            box-sizing: border-box;
        }
        header {
            margin-bottom: 24px;
            border-bottom: 1px solid #f0f0f2;
            padding-bottom: 16px;
        }
        h1 { font-size: 22px; margin: 0 0 6px 0; font-weight: 700; }
        .subtitle { font-size: 13px; color: var(--text-sub); margin: 0; }
        .route-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
        .route-tag { font-size: 11px; background: #f0f0f5; color: #48484a; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 16px; outline: none; }
        button { padding: 12px 20px; border: none; background-color: var(--primary-color); color: white; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .bus-card { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #f0f0f2; }
        .bus-card:last-child { border-bottom: none; }
        .bus-info { display: flex; align-items: center; gap: 14px; }
        .route-number {
            font-weight: 800; font-size: 16px; padding: 6px 10px; border-radius: 6px; min-width: 54px; text-align: center; color: black;
        }
        .ctb-badge { background-color: #ffcc00; }
        .kmb-badge { background-color: #f3c6c6; color: #a90000; }
        .destination-text { font-weight: 600; font-size: 15px; }
        .operator-tag { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
        .eta-value { font-weight: 700; font-size: 16px; color: var(--success-color); }
        .imminent { color: #ff3b30; }
        .status-msg { text-align: center; color: var(--text-sub); padding: 10px 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>My Bus Tracker</h1>
        <p class="subtitle">Real-time dynamic schedule monitor</p>
        <div class="route-tags">
            <span class="route-tag">95C</span>
            <span class="route-tag">37A</span>
            <span class="route-tag">970X</span>
            <span class="route-tag">37B</span>
            <span class="route-tag">37X</span>
            <span class="route-tag">40</span>
            <span class="route-tag">40P</span>
        </div>
    </header>

    <div class="search-box">
        <input type="text" id="stopIdInput" value="002271" maxlength="6" placeholder="Enter 6-digit Citybus ID">
        <button onclick="fetchSchedules()">Refresh</button>
    </div>

    <div id="results" class="results-container">
        <div class="status-msg">Loading current schedule...</div>
    </div>
</div>

<script>
    // Unified mapping dictionary to cross-link physical locations across operators
    const BUS_STOP_MAPPING = {
        "002243": { ctb: "002243", kmb: "CE04-T-1100-0" }, // Queen Mary Hospital
        "002271": { ctb: "002271", kmb: "CH09-T-1000-0" }  // Chi Fu Fa Yuen Terminal
    };

    // Strict Filter Array: Only allow these exact route strings to render
    const REQUESTED_ROUTES = ["95C", "37A", "970X", "37B", "37X", "40", "40P"];

    async function fetchSchedules() {
        const inputId = document.getElementById('stopIdInput').value.trim();
        const resultsDiv = document.getElementById('results');

        if (!inputId) {
            alert('Please provide a valid Stop ID.');
            return;
        }

        resultsDiv.innerHTML = '<div class="status-msg">Streaming & filtering JSON data...</div>';
        let mergedEtaList = [];

        const targetStop = BUS_STOP_MAPPING[inputId] || { ctb: inputId, kmb: null };

        // 1. Fetch and Filter Citybus JSON Stream
        if (targetStop.ctb) {
            try {
                const response = await fetch(`https://rt.data.gov.hk/v1/transport/batch/stop-eta/CTB/${targetStop.ctb}`);
                if (response.ok) {
                    const json = await response.json();
                    if (json && json.data) {
                        json.data.forEach(item => {
                            const parsedRoute = item.route.toUpperCase();
                            // Target filter rule implementation
                            if (REQUESTED_ROUTES.includes(parsedRoute) && item.eta) {
                                mergedEtaList.push({
                                    route: parsedRoute,
                                    dest: item.dest_en,
                                    eta: item.eta,
                                    operator: "Citybus",
                                    badgeClass: "ctb-badge"
                                });
                            }
                        });
                    }
                }
            } catch (e) { console.error("Citybus JSON stream failed:", e); }
        }

        // 2. Fetch and Filter KMB JSON Stream
        if (targetStop.kmb) {
            try {
                const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${targetStop.kmb}`);
                if (response.ok) {
                    const json = await response.json();
                    if (json && json.data) {
                        json.data.forEach(item => {
                            // Strip variant modifiers (e.g., '40P-1' to '40P')
                            const parsedRoute = item.route.split('-')[0].toUpperCase();
                            // Target filter rule implementation
                            if (REQUESTED_ROUTES.includes(parsedRoute) && item.eta) {
                                mergedEtaList.push({
                                    route: parsedRoute,
                                    dest: item.dest_en,
                                    eta: item.eta,
                                    operator: "KMB",
                                    badgeClass: "kmb-badge"
                                });
                            }
                        });
                    }
                }
            } catch (e) { console.error("KMB JSON stream failed:", e); }
        }

        // 3. Deduplicate exact overlapping entries
        const uniqueTracker = new Set();
        mergedEtaList = mergedEtaList.filter(item => {
            const fingerprint = `${item.route}-${item.eta}-${item.operator}`;
            if (uniqueTracker.has(fingerprint)) return false;
            uniqueTracker.add(fingerprint);
            return true;
        });

        if (mergedEtaList.length === 0) {
            resultsDiv.innerHTML = '<div class="status-msg">No matching departures found for your requested lines right now.</div>';
            return;
        }

        // 4. Sort arrays chronologically and calculate relative time bounds
        mergedEtaList.sort((a, b) => new Date(a.eta) - new Date(b.eta));
        const now = new Date();

        resultsDiv.innerHTML = mergedEtaList.map(bus => {
            let etaDisplay = "No ETA";
            let isImminent = false;

            const timeDiffMins = Math.max(0, Math.round((new Date(bus.eta) - now) / 60000));
            if (timeDiffMins <= 1) {
                etaDisplay = timeDiffMins === 0 ? "Arrived" : "1 min";
                isImminent = true;
            } else {
                etaDisplay = `${timeDiffMins} mins`;
            }

            return `
                <div class="bus-card">
                    <div class="bus-info">
                        <div class="route-number ${bus.badgeClass}">${bus.route}</div>
                        <div>
                            <div class="destination-text">to ${bus.dest || 'Terminal'}</div>
                            <div class="operator-tag">${bus.operator}</div>
                        </div>
                    </div>
                    <div class="eta-value ${isImminent ? 'imminent' : ''}">${etaDisplay}</div>
                </div>
            `;
        }).join('');
    }

    // Initialize application pull on interface mount
    window.addEventListener('DOMContentLoaded', fetchSchedules);
</script>

</body>
</html>
