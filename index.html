<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citybus Real-Time Tracker</title>
    <style>
        :root {
            --primary-color: #0071e3;
            --accent-color: #ffcc00;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --success-color: #34c759;
            --border-color: #d2d2d7;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 24 rgba(0, 0, 0, 0.08);
            padding: 24px;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 24px;
            border-bottom: 1px solid #f0f0f2;
            padding-bottom: 16px;
        }

        h1 {
            font-size: 22px;
            margin: 0 0 6px 0;
            font-weight: 700;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-sub);
            margin: 0;
        }

        .route-tags {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .route-tag {
            font-size: 11px;
            background: #f0f0f5;
            color: #48484a;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .bus-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f2;
        }

        .bus-card:last-child {
            border-bottom: none;
        }

        .bus-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .route-number {
            background-color: var(--accent-color);
            color: #000000;
            font-weight: 800;
            font-size: 16px;
            padding: 6px 10px;
            border-radius: 6px;
            min-width: 54px;
            text-align: center;
        }

        .destination-text {
            font-weight: 600;
            font-size: 15px;
        }

        .eta-value {
            font-weight: 700;
            font-size: 16px;
            color: var(--success-color);
        }
        
        .imminent {
            color: #ff3b30;
        }

        .status-msg {
            text-align: center;
            color: var(--text-sub);
            padding: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Citybus Tracker</h1>
        <p class="subtitle">Real-time dynamic arrival schedules</p>
        <div class="route-tags">
            <span class="route-tag">95C</span>
            <span class="route-tag">37A</span>
            <span class="route-tag">970X</span>
            <span class="route-tag">37B</span>
            <span class="route-tag">37X</span>
            <span class="route-tag">40</span>
            <span class="route-tag">40P</span>
        </div>
    </header>

    <div class="search-box">
        <input type="text" id="stopIdInput" value="002271" maxlength="6" placeholder="Enter 6-digit Stop ID">
        <button onclick="fetchSchedules()">Refresh</button>
    </div>

    <div id="results" class="results-container">
        <div class="status-msg">Enter a Citybus stop code to display schedules.</div>
    </div>
</div>

<script>
    // List of your daily routes
    const TARGET_ROUTES = ["95C", "37A", "970X", "37B", "37X", "40", "40P"];

    async function fetchSchedules() {
        const stopId = document.getElementById('stopIdInput').value.trim();
        const resultsDiv = document.getElementById('results');

        if (!stopId) {
            alert('Please provide a 6-digit Stop ID.');
            return;
        }

        resultsDiv.innerHTML = '<div class="status-msg">Fetching direct schedule streams...</div>';

        let allEtaData = [];

        // Fetch data for each route one-by-one to safely bypass backend locks
        for (const route of TARGET_ROUTES) {
            try {
                const url = `https://rt.data.gov.hk/v2/transport/citybus/stop-eta/ctb/${stopId}/${route}`;
                const response = await fetch(url);
                if (response.ok) {
                    const json = await response.json();
                    if (json.data && json.data.length > 0) {
                        allEtaData = allEtaData.concat(json.data);
                    }
                }
            } catch (e) {
                console.error(`Skipping route ${route} due to a connection block`, e);
            }
        }

        // Handle empty results
        if (allEtaData.length === 0) {
            resultsDiv.innerHTML = '<div class="status-msg">No active schedules found for these routes at this stop right now.</div>';
            return;
        }

        // Sort schedules chronologically
        allEtaData.sort((a, b) => new Date(a.eta) - new Date(b.eta));

        const currentTime = new Date();

        resultsDiv.innerHTML = allEtaData.map(bus => {
            let displayTime = "No ETA";
            let isImminent = false;

            if (bus.eta) {
                const minsLeft = Math.max(0, Math.round((new Date(bus.eta) - currentTime) / 60000));
                if (minsLeft <= 1) {
                    displayTime = minsLeft === 0 ? "Arrived" : "1 min";
                    isImminent = true;
                } else {
                    displayTime = `${minsLeft} mins`;
                }
            } else if (bus.rmk_en) {
                displayTime = bus.rmk_en;
            }

            return `
                <div class="bus-card">
                    <div class="bus-info">
                        <div class="route-number">${bus.route}</div>
                        <div class="destination-text">to ${bus.dest_en || 'Destination'}</div>
                    </div>
                    <div class="eta-value ${isImminent ? 'imminent' : ''}">${displayTime}</div>
                </div>
            `;
        }).join('');
    }

    // Load instantly when page displays
    window.addEventListener('DOMContentLoaded', fetchSchedules);
</script>

</body>
</html>
